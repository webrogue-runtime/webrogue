[package]
name = "webrogue-wasip1"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true

[features]

[dependencies]
anyhow = { workspace = true }
webrogue-wrapp = { workspace = true }
wasi-common = { workspace = true, default-features = false, features = [] }
wiggle = { workspace = true, default-features = false }
async-trait = { workspace = true }
rand_core = { workspace = true }
rand = { workspace = true, default-features = false, features = ["sys_rng", "thread_rng"] }
getrandom = { workspace = true, default-features = false, features = ["wasm_js"] }
cap-rand = { workspace = true }

[target.'cfg(unix)'.dependencies]
rustix = { workspace = true, features = ["pipe"] }

[target.'cfg(windows)'.dependencies]
io-extras = { workspace = true }
windows-sys = { workspace = true, features = ["Win32_System_Threading", "Win32_Security"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
wasi-common = { workspace = true, default-features = false, features = ["sync"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]

[dev-dependencies]
rand = { workspace = true, default-features = true, features = ["thread_rng"] }
