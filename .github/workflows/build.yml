on:
  workflow_call:
    inputs:
      is_release:
        required: true
        type: boolean

jobs:
  platforms:
    uses: ./.github/workflows/build_platforms.yml
    with:
      is_release: ${{inputs.is_release}}
  mods:
    uses: ./.github/workflows/build_mods.yml
    with:
      is_release: ${{inputs.is_release}}
